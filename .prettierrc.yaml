# Prettier 配置文件

printWidth: 80 # 单行长度，超过此长度则换行
tabWidth: 2 # 缩进长度，设为 2 个空格
useTabs: false # 是否使用 tab 进行缩进（false 为使用空格）
semi: true # 句末是否使用分号
singleQuote: false # 是否使用单引号（false 为使用双引号 ""）
quoteProps: as-needed # 仅在必需时为对象的 key 添加引号
jsxSingleQuote: false # jsx 中是否使用单引号
trailingComma: none # 多行时是否打印尾随逗号（none 为不打印）
bracketSpacing: true # 在对象前后添加空格 - eg: { foo: bar }
jsxBracketSameLine: true # 多属性 html 标签的 ‘>’ 不折行放置
arrowParens: always # 单参数箭头函数参数周围使用圆括号 - eg: (x) => x
requirePragma: false # 无需顶部注释即可格式化
insertPragma: false # 在已被 Prettier 格式化的文件顶部加上标注
proseWrap: preserve # 保持原样换行
htmlWhitespaceSensitivity: ignore # 对 HTML 全局空白不敏感
vueIndentScriptAndStyle: false # 不对 Vue 中的 script 及 style 标签缩进
endOfLine: auto # 结束行形式，自动检测 (LF/CRLF)
embeddedLanguageFormatting: auto # 对引用代码进行格式化
